version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: crisis_transport
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://admin:secret@db:5432/crisis_transport
      REDIS_URL: redis://redis:6379/0

  celery:
    build: .
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - ./app:/app
    depends_on:
      - redis
      - db

volumes:
  postgres_data: